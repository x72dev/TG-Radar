<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        @keyframes sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse-ring {
            0% { r: 10px; opacity: 1; }
            100% { r: 100px; opacity: 0; }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .bg { fill: #000000; }
        .grid { stroke: rgba(255, 255, 255, 0.05); stroke-width: 1; }
        .ring { fill: none; stroke: rgba(255, 255, 255, 0.15); stroke-width: 1; }
        .radar-sweep {
            transform-origin: 160px 120px;
            animation: sweep 4s linear infinite;
        }
        .pulse {
            transform-origin: 160px 120px;
            animation: pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            fill: none;
            stroke: #58A6FF;
            stroke-width: 1.5;
        }
        .title {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 64px;
            font-weight: 800;
            fill: #FFFFFF;
            letter-spacing: -2px;
        }
        .subtitle {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 16px;
            font-weight: 600;
            fill: #8B949E;
            letter-spacing: 4px;
        }
        .dot { transform-origin: center; }
        .d1 { animation: blink 2s infinite 0.2s; }
        .d2 { animation: blink 2s infinite 1.5s; }
        .d3 { animation: blink 2s infinite 0.7s; }
        .d4 { animation: blink 2s infinite 2.1s; }
    </style>

    <rect width="800" height="240" class="bg" rx="12"/>
    
    <!-- Background Grid -->
    <g class="grid">
        <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 0 200 L 800 200" />
        <path d="M 80 0 L 80 240 M 160 0 L 160 240 M 240 0 L 240 240 M 320 0 L 320 240 M 400 0 L 400 240 M 480 0 L 480 240 M 560 0 L 560 240 M 640 0 L 640 240 M 720 0 L 720 240" />
    </g>

    <!-- Radar Graphic -->
    <g>
        <circle cx="160" cy="120" r="80" class="ring" />
        <circle cx="160" cy="120" r="40" class="ring" />
        <line x1="80" y1="120" x2="240" y2="120" class="ring" />
        <line x1="160" y1="40" x2="160" y2="200" class="ring" />
        
        <!-- Radar Sweep -->
        <path d="M 160 120 L 160 40 A 80 80 0 0 1 240 120 Z" fill="url(#sweep-grad)" class="radar-sweep" />
        
        <!-- Blinking Targets -->
        <circle cx="210" cy="80" r="3" fill="#3FB950" class="dot d1" />
        <circle cx="110" cy="150" r="4" fill="#F85149" class="dot d2" />
        <circle cx="180" cy="170" r="2.5" fill="#58A6FF" class="dot d3" />
        <circle cx="130" cy="90" r="2" fill="#D2A8FF" class="dot d4" />
        
        <!-- Central Pulse -->
        <circle cx="160" cy="120" r="4" fill="#FFFFFF" />
        <circle cx="160" cy="120" class="pulse" />
    </g>

    <!-- Text -->
    <text x="320" y="125" class="title">TG-Radar</text>
    <text x="325" y="165" class="subtitle">ENTERPRISE EVENT ROUTER</text>

    <!-- Gradients -->
    <defs>
        <linearGradient id="sweep-grad" x1="160" y1="120" x2="240" y2="120" gradientUnits="userSpaceOnUse">
            <stop stop-color="#58A6FF" stop-opacity="0.6"/>
            <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
        </linearGradient>
    </defs>
</svg>